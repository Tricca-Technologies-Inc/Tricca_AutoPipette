[MODEL]
model = verticle

[NAME]
name_pipette_servo = pipette_servo
name_pipette_stepper = pipette_stepper

[NETWORK]
hostname = tap-tyson.local
ip = 192.168.0.101

[BOUNDARY]
safe_altitude = 10

[SPEED]
speed_xy = 38000
speed_z = 12000
speed_pipette_down = 200
speed_pipette_up = 200
speed_pipette_up_slow = 30
speed_max = 99999
speed_factor = 100
velocity_max = 42000
ACCEL_PIPETTE_HOME = 800
ACCEL_PIPETTE_MOVE = 800
ACCEL_GANTRY_MAX = 40000

[SERVO]
servo_angle_retract = 100
servo_angle_eject = 130

[WAIT]
wait_eject = 850
wait_movement = 100
wait_aspirate = 200
aft_air = 2
ext_air = 30

[VOLUME_CONV]
